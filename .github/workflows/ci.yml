name: CI

on: [push, pull_request]

defaults:
  run:
    shell: bash

jobs:
  build:
    name: ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}

    strategy:
      fail-fast: false
      matrix:
        platform:
        - { name: Windows,     os: windows-2022     }
        - { name: Linux x64,   os: ubuntu-latest    }
        - { name: Linux ARM64, os: ubuntu-24.04-arm }
        - { name: macOS,       os: macos-latest     }

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo add-apt-repository universe
        sudo apt-get update
        sudo apt-get install -y \
          libxrandr-dev libxcursor-dev libxi-dev libudev-dev \
          libgl1-mesa-dev libegl1-mesa-dev libopenal-dev \
          libflac-dev libvorbis-dev libogg-dev
        sudo apt-get install -y libfreetype-dev libwxgtk3.2-dev

    - name: Install macOS Dependencies
      if: runner.os == 'macOS'
      run: brew install wxwidgets

    - name: Configure
      run: |
        EXTRA=""
        if [ "$RUNNER_OS" = "Windows" ]; then
          EXTRA="-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows-static-md"
        fi
        cmake -B build -DBUILD_SHARED_LIBS=FALSE ${{ matrix.platform.flags }} $EXTRA

    - name: Build
      run: cmake --build build --config Release

    - name: Prepare Game Bundle
      run: |
        cp -r assets build/bin/ || true
        mkdir -p build/bin/caves
        touch build/bin/caves/.gitkeep

    - name: Upload Game Bundle
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.platform.name }}
        path: |
          build/bin/**
